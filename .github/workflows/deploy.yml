name: Deploy & Release

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Get version from package.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content './package.json' -Raw | ConvertFrom-Json).version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Check if release exists
        id: check
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          $result = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract changelog for version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        shell: pwsh
        run: |
          $notes = & .github/scripts/extract-changelog.ps1 -Version '${{ steps.version.outputs.version }}'
          # Write multiline output using delimiter
          $delimiter = [System.Guid]::NewGuid().ToString('N')
          "notes<<$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "$delimiter" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          make_latest: true
