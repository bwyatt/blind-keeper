name: CI

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  release-check:
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch origin main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate release readiness
        shell: pwsh
        run: .github/scripts/validate-release.ps1
