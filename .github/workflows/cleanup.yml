name: Clean up branches

on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    if: github.head_ref != 'main' && github.head_ref != 'develop'
    permissions:
      contents: write
    steps:
      - name: Delete branch
        uses: actions/github-script@v7
        with:
          script: |
            const ref = `heads/${context.payload.pull_request.head.ref}`;
            try {
              await github.rest.git.deleteRef({ owner: context.repo.owner, repo: context.repo.repo, ref });
              console.log(`Deleted branch: ${context.payload.pull_request.head.ref}`);
            } catch (error) {
              if (error.status === 422) {
                console.log('Branch already deleted');
              } else {
                throw error;
              }
            }
